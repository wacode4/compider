<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Compider</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auth-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 400px; }
        .auth-card .brand { text-align: center; font-size: 28px; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
        .auth-card .brand span { color: #4fc3f7; }
        .auth-card .subtitle { text-align: center; color: #999; font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 4px; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #4fc3f7; }
        .btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #4fc3f7; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-submit:hover { background: #039be5; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #c62828; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
        .switch { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
        .switch a { color: #4fc3f7; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="brand"><span>Compider</span></div>
        <div class="subtitle">Create your account</div>
        <form id="registerForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Optional">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required minlength="6">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Sign Up</button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
        <div class="switch">Already have an account? <a href="/login">Login</a></div>
    </div>
    <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('errorMsg');
        btn.disabled = true;
        err.style.display = 'none';
        try {
            const resp = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value || null,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            if (resp.ok) {
                location.href = '/dashboard';
            } else {
                const data = await resp.json();
                err.textContent = data.detail || 'Registration failed';
                err.style.display = 'block';
            }
        } catch (ex) {
            err.textContent = 'Network error';
            err.style.display = 'block';
        }
        btn.disabled = false;
    });
    </script>
</body>
</html>
